# P2 Apple RGW SSL scenarios on tentacle hotfix.
# Covers: P2-1 rotation, P2-3 negative PEM, P2-4 export/import, P2-5 idempotent apply.
#
# global-conf: conf/tentacle/rgw/tier-0_rgw.yaml

tests:
  - test:
      abort-on-fail: true
      module: install_prereq.py
      name: setup pre-requisites
      desc: Install prerequisites.

  - test:
      abort-on-fail: true
      config:
        verify_cluster_health: true
        steps:
          - config:
              command: bootstrap
              service: cephadm
              args:
                registry-url: registry.redhat.io
                mon-ip: node1
                orphan-initial-daemons: true
                skip-monitoring-stack: true
                initial-dashboard-password: admin@123
                dashboard-password-noupdate: true
          - config:
              command: add_hosts
              service: host
              args:
                attach_ip_address: true
                labels: apply-all-labels
          - config:
              command: apply
              service: mgr
              args:
                placement:
                  label: mgr
          - config:
              command: apply
              service: mon
              args:
                placement:
                  label: mon
          - config:
              command: apply
              service: osd
              args:
                all-available-devices: true
      desc: Bootstrap cluster for Apple SSL P2 tests.
      destroy-cluster: false
      module: test_cephadm.py
      name: deploy cluster

  - test:
      abort-on-fail: true
      config:
        steps:
          - config:
              command: apply_spec
              service: orch
              validate-spec-services: true
              specs:
                - service_type: rgw
                  service_id: rgw.ssl.pkcs1
                  placement:
                    nodes:
                      - node3
                      - node4
                      - node5
                  spec:
                    ssl: true
                    rgw_frontend_port: 443
                    rgw_frontend_ssl_certificate: create-cert_apple_PKCS#1
      desc: Deploy Apple PKCS#1 RGW for P2 tests.
      destroy-cluster: false
      module: test_cephadm.py
      name: deploy apple rgw

  - test:
      name: P2-1 certificate rotation redeploy
      module: apple_rgw_ssl_scenarios.py
      desc: Redeploy RGW after cert generation (rotation path).
      config:
        scenario: certificate_rotation
        service_id: rgw.ssl.pkcs1
        min_running: 3
        wait_seconds: 60

  - test:
      name: P2-4 export import roundtrip
      module: apple_rgw_ssl_scenarios.py
      desc: Export RGW spec and re-apply.
      config:
        scenario: export_import_roundtrip
        service_id: rgw.ssl.pkcs1
        min_running: 3
        wait_seconds: 45

  - test:
      name: P2-5 idempotent orch apply
      module: apple_rgw_ssl_scenarios.py
      desc: Apply exported spec 3 times without flapping.
      config:
        scenario: idempotent_apply
        service_id: rgw.ssl.pkcs1
        min_running: 3
        repeat: 3
        wait_seconds: 20

  - test:
      abort-on-fail: false
      name: P2-3 negative invalid PEM
      module: apple_rgw_ssl_scenarios.py
      desc: Invalid PEM must fail apply without removing existing RGW.
      config:
        scenario: negative_invalid_pem
        service_id: rgw.ssl.pkcs1
        expect_apply_failure: true

  - test:
      abort-on-fail: true
      config:
        command: add
        id: client.1
        node: node6
        install_packages:
          - ceph-common
        copy_admin_keyring: true
        git_clone: true
        git_node_role: rgw
      desc: Configure RGW client node for ceph-qe-scripts S3 tests.
      destroy-cluster: false
      module: test_client.py
      name: configure client

  - test:
      name: install apple root ca trust
      module: apple_rgw_ssl_scenarios.py
      desc: Install Apple PKI root CA on RGW and client for HTTPS S3.
      config:
        scenario: install_apple_root_ca
        roles:
          - rgw
          - client

  - test:
      name: S3 IO boto3 basic bucket ops
      desc: M buckets N objects via boto3 (ceph-qe-scripts).
      module: sanity_rgw.py
      config:
        run-on-rgw: true
        script-name: test_Mbuckets_with_Nobjects.py
        config-file-name: test_Mbuckets_with_Nobjects.yaml

  - test:
      name: S3 IO s3cmd basic operations
      desc: Basic put/get/delete via s3cmd (ceph-qe-scripts).
      module: sanity_rgw.py
      config:
        run-on-rgw: true
        script-name: ../s3cmd/test_s3cmd.py
        config-file-name: ../../s3cmd/configs/test_s3cmd.yaml

  - test:
      name: S3 IO aws cli copy object
      desc: s3 copy object via aws CLI (ceph-qe-scripts).
      module: sanity_rgw.py
      config:
        run-on-rgw: true
        script-name: ../aws/test_sts_rename_large_object.py
        config-file-name: ../../aws/configs/test_s3copyObj_admin_user.yaml
